<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — FORMULA SMAN 1 MOJOSARI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:      #F7F6F3;
  --paper-2:    #FFFFFF;
  --ink:        #14151A;
  --ink-soft:   #5B5D66;
  --ink-faint:  #9A9CA3;
  --line:       #E2E0DA;
  --line-strong:#CFCCC4;
  --accent:     #FF5A1F;
  --accent-tint:#FFE7DA;
  --status:     #16A34A;
  --f-display: 'Space Grotesk', sans-serif;
  --f-body:    'Inter', sans-serif;
  --f-mono:    'IBM Plex Mono', monospace;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  font-family: var(--f-body);
  background: var(--paper);
  color: var(--ink);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1.5rem;
}
a{ color:inherit; text-decoration:none; }
img{ display:block; }
.mono{ font-family:var(--f-mono); }

.login-card{
  background:var(--paper-2);
  border:1px solid var(--line);
  border-radius:12px;
  padding:2.5rem 2.8rem;
  max-width:420px;
  width:100%;
  box-shadow:0 12px 40px rgba(0,0,0,0.04);
}
.login-card .brand{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.5rem;
  margin-bottom:2rem;
  text-align:center;
}
.login-card .brand .mark{
  width:200px;
  height:200px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  border-radius:100px;
  margin:0 auto;
}
.login-card .brand .mark img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.login-card .brand .name{
  font-family:var(--f-display);
  font-weight:700;
  font-size:1.2rem;
  line-height:1.15;
  color:var(--ink);
}
.login-card .brand .sub{
  font-family:var(--f-mono);
  font-size:.6rem;
  color:var(--ink-soft);
  letter-spacing:.05em;
  margin-top:-.2rem;
}
.login-card h1{
  font-family:var(--f-display);
  font-size:1.6rem;
  font-weight:600;
  margin-bottom:.2rem;
  text-align:center;
}
.login-card .subhead{
  color:var(--ink-soft);
  font-size:.88rem;
  margin-bottom:1.8rem;
  text-align:center;
}
.login-card form{
  display:flex;
  flex-direction:column;
  gap:1.2rem;
}
.login-card label{
  font-family:var(--f-mono);
  font-size:.65rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--ink-faint);
  display:block;
  margin-bottom:.3rem;
}
.login-card input{
  width:100%;
  padding:.75rem 1rem;
  font-family:var(--f-body);
  font-size:.9rem;
  color:var(--ink);
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:6px;
  outline:none;
  transition: border-color .2s ease;
}
.login-card input:focus{
  border-color:var(--accent);
}
.login-card .btn-login{
  font-family:var(--f-body);
  font-weight:600;
  font-size:.88rem;
  padding:.75rem 1.5rem;
  background:var(--accent);
  color:var(--paper-2);
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition: background .2s ease;
  margin-top:.3rem;
  width:100%;
}
.login-card .btn-login:hover{
  background:#e0500f;
}
.login-card .btn-login:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
.toast{
  margin-top:1rem;
  padding:.7rem 1rem;
  border-radius:6px;
  font-weight:500;
  font-size:.82rem;
  display:none;
  align-items:center;
  gap:.5rem;
  justify-content:center;
}
.toast.show{ display:flex; }
.toast.success{
  background:#ecfdf5;
  border:1px solid #a7f3d0;
  color:#065f46;
}
.toast.error{
  background:#fef2f2;
  border:1px solid #fecaca;
  color:#991b1b;
}
@media (max-width: 500px){
  .login-card{ padding:1.8rem 1.2rem; }
  .login-card .brand .mark{ width:50px; height:50px; }
  .login-card .brand .name{ font-size:1rem; }
}
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <div class="mark"><img src="formula.png" alt="FORMULA Logo" /></div>
    <div>
      <div class="name">FORMULA</div>
      <div class="sub">SMAN 1 MOJOSARI</div>
    </div>
  </div>

  <h1>Selamat Datang</h1>
  <p class="subhead">Masuk ke dashboard</p>

  <form id="loginForm">
    <div>
      <label>Email</label>
      <input type="email" placeholder="email@example.com" required id="loginEmail" />
    </div>
    <div>
      <label>Password</label>
      <input type="password" placeholder="••••••••" required id="loginPassword" />
    </div>
    <button type="submit" class="btn-login" id="loginBtn">Masuk →</button>
  </form>

  <div id="toast" class="toast">
    <span id="toastIcon">✅</span>
    <span id="toastText">Berhasil!</span>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

  // ============================================================
  // KONFIGURASI FIREBASE — GANTI DENGAN MILIKMU
  // ============================================================
  const firebaseConfig = {
    apiKey: "AIzaSyB_TwXy2y4-ym9jE8VLi297huJJvf1MwBM",
    authDomain: "formula-7373d.firebaseapp.com",
    projectId: "formula-7373d",
    storageBucket: "formula-7373d.firebasestorage.app",
    messagingSenderId: "647287637575",
    appId: "1:647287637575:web:0ac5b158b74247f930d362"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const form = document.getElementById('loginForm');
  const email = document.getElementById('loginEmail');
  const password = document.getElementById('loginPassword');
  const btn = document.getElementById('loginBtn');
  const toast = document.getElementById('toast');
  const toastText = document.getElementById('toastText');
  const toastIcon = document.getElementById('toastIcon');

  function showToast(text, isSuccess = true) {
    toast.className = 'toast show';
    toast.className += isSuccess ? ' success' : ' error';
    toastText.textContent = text;
    toastIcon.textContent = isSuccess ? '✅' : '⚠️';
    clearTimeout(window.toastTimer);
    window.toastTimer = setTimeout(() => { toast.className = 'toast'; }, 4000);
  }

  // Cek sudah login
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      try {
        const snapshot = await get(ref(db, 'users/' + user.uid));
        if (snapshot.exists()) {
          const data = snapshot.val();
          if (data.role === 'admin') {
            window.location.replace('dashboard-admin.html');
          } else {
            window.location.replace('dashboard-anggota-formula.html');
          }
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const emailVal = email.value.trim();
    const passVal = password.value.trim();

    if (!emailVal || !passVal) {
      showToast('Email dan password harus diisi!', false);
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Memuat...';

    try {
      const userCredential = await signInWithEmailAndPassword(auth, emailVal, passVal);
      const user = userCredential.user;

      const snapshot = await get(ref(db, 'users/' + user.uid));
      if (snapshot.exists()) {
        const data = snapshot.val();
        showToast('Login berhasil!', true);

        setTimeout(() => {
          if (data.role === 'admin') {
            window.location.replace('dashboard-admin.html');
          } else {
            window.location.replace('dashboard-anggota-formula.html');
          }
        }, 1200);
      } else {
        showToast('Data pengguna tidak ditemukan.', false);
        btn.disabled = false;
        btn.textContent = 'Masuk →';
      }

    } catch (error) {
      console.error('Login error:', error);
      let message = 'Terjadi kesalahan. Coba lagi.';
      switch (error.code) {
        case 'auth/user-not-found': message = 'Email tidak terdaftar.'; break;
        case 'auth/wrong-password': message = 'Password salah.'; break;
        case 'auth/invalid-email': message = 'Format email tidak valid.'; break;
        case 'auth/too-many-requests': message = 'Terlalu banyak percobaan. Coba nanti.'; break;
        default: message = error.message || 'Gagal login. Coba lagi.';
      }
      showToast(message, false);
      btn.disabled = false;
      btn.textContent = 'Masuk →';
    }
  });
</script>

</body>
</html>
