<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — FORMULA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f0f0f0;
}
.login-box {
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  width: 350px;
}
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #ddd;
  border-radius: 6px;
  box-sizing: border-box;
}
button {
  width: 100%;
  padding: 12px;
  background: #FF5A1F;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}
button:hover { background: #e0500f; }
#result {
  margin-top: 15px;
  padding: 10px;
  border-radius: 6px;
  text-align: center;
}
.error { background: #fee; color: #c00; }
.success { background: #efe; color: #060; }
</style>
</head>
<body>

<div class="login-box">
  <h2>🔐 Login FORMULA</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>
  <div id="result"></div>
</div>

<script>
// ============================================
// KONFIGURASI SUPABASE
// ============================================
const supabaseClient = supabase.createClient(
  'https://xdpgscxconehpjisngxv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkcGdzY3hjb25laHBqaXNuZ3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzMTU5MTYsImV4cCI6MjA5OTg5MTkxNn0.phZh4eymJUU6ouQHLXvjxknMhbaQKo7RLm9usP8bfI4'
);

// ============================================
// ELEMEN
// ============================================
const form = document.getElementById('loginForm');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const result = document.getElementById('result');

// ============================================
// LOGIN - PAKE SUPABASE AUTH
// ============================================
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  
  result.className = '';
  result.textContent = '⏳ Memuat...';
  
  console.log('🚀 LOGIN:', email);
  
  try {
    // 🔥 PAKE SUPABASE AUTH - BIKIN auth.uid() KEBACA!
    const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });
    
    console.log('🔐 Auth response:', { authData, authError });
    
    if (authError) {
      result.className = 'error';
      result.textContent = '❌ ' + authError.message;
      return;
    }
    
    // AMBIL DATA USER DARI TABEL USERS (PAKE auth_id)
    const { data: userData, error: userError } = await supabaseClient
      .from('users')
      .select('*')
      .eq('auth_id', authData.user.id)
      .single();
    
    console.log('👤 User data:', userData);
    
    if (userError || !userData) {
      result.className = 'error';
      result.textContent = '❌ Data user tidak ditemukan!';
      return;
    }
    
    // ✅ LOGIN BERHASIL
    result.className = 'success';
    result.textContent = '✅ Login berhasil! Redirecting...';
    
    localStorage.setItem('userLoggedIn', 'true');
    localStorage.setItem('userEmail', email);
    localStorage.setItem('userRole', userData.role || 'member');
    localStorage.setItem('userName', userData.nama || '');
    localStorage.setItem('userId', authData.user.id);
    
    setTimeout(() => {
      if (userData.role === 'admin') {
        window.location.href = 'dashboard-admin.html';
      } else {
        window.location.href = 'dashboard-anggota-formula.html';
      }
    }, 1500);
    
  } catch (err) {
    console.error('❌ Error:', err);
    result.className = 'error';
    result.textContent = '❌ Error: ' + err.message;
  }
});
</script>

</body>
</html>
